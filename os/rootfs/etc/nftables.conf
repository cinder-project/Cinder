#!/usr/sbin/nft -f
# =============================================================================
# Cinder OS - nftables.conf
# Default host firewall policy for Cinder runtime nodes.
#
# Allowed inbound:
#   22/tcp    SSH administration
#   25565/tcp Minecraft server port
#   8080/tcp  Cinder dashboard HTTP endpoint
#
# Everything else is dropped.
# =============================================================================

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0;
        policy drop;

        # Always allow loopback and established return traffic.
        iifname "lo" accept
        ct state established,related accept

        # ICMP and ICMPv6 are required for path MTU and diagnostics.
        ip protocol icmp accept
        ip6 nexthdr ipv6-icmp accept

        # SSH with conservative new-connection rate limiting.
        tcp dport 22 ct state new limit rate 10/minute burst 20 packets accept

        # Runtime service ports.
        tcp dport 25565 ct state new accept
        tcp dport 8080 ct state new accept

        # Invalid packet tracking state is dropped immediately.
        ct state invalid drop
    }

    chain forward {
        type filter hook forward priority 0;
        policy drop;
    }

    chain output {
        type filter hook output priority 0;
        policy accept;
    }
}
