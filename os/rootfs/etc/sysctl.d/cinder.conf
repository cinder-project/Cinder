# =============================================================================
# Cinder OS - sysctl tuning
# Kernel and network defaults tuned for sustained Minecraft server operation
# on Raspberry Pi 4 / Pi 400 class hardware.
# =============================================================================

# Network queue and socket headroom for bursty player traffic.
net.core.somaxconn = 4096
net.core.netdev_max_backlog = 4096
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Protect against abusive TCP patterns while keeping latency predictable.
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_fin_timeout = 20
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# Reduce SD-card write amplification and background flush stalls.
vm.swappiness = 10
vm.dirty_background_ratio = 5
vm.dirty_ratio = 15
vm.vfs_cache_pressure = 50

# Raise descriptor ceiling for Java sockets/files under load.
fs.file-max = 262144

# Safety: panic and reboot quickly on unrecoverable kernel conditions.
kernel.panic = 10
kernel.panic_on_oops = 1
