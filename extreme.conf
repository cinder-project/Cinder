# =============================================================================
# Cinder Runtime — Preset: extreme
# =============================================================================
#
# Target profile:
#   Maximum sustained performance on an actively cooled, overclocked-capable
#   Raspberry Pi 4 (8GB). Intended for operators who have characterised their
#   hardware, confirmed thermal headroom, and want to extract every last
#   millisecond of tick budget for high-density hosting (35–50 players,
#   heavy mob farms, or large simulation distances).
#
# WARNING — READ BEFORE USING:
#
#   This preset pushes the Pi 4 near its operational limits. It is NOT
#   appropriate for:
#     - Passively cooled or uncased Pi 4 units
#     - Shared-power or battery-backed deployments
#     - Pi units without a confirmed stable overclock (if applying OC)
#     - First-time Cinder deployments (start with survival, graduate here)
#
#   Before enabling this preset:
#     1. Verify your cooling solution: ICE Tower, Argon ONE M.2, or equivalent.
#        The Pi 4 must sustain < 75°C under 100% CPU load for 30+ minutes.
#     2. Run the benchmark preset first. If p99 MSPT > 35ms under benchmark
#        load, your hardware is not ready for extreme.
#     3. Optional overclock: 2000 MHz ARM, 500 MHz GPU, 3200 MHz RAM.
#        Apply via /boot/config.txt. Requires active cooling and stable PSU.
#        Cinder does not apply overclocking — this must be done at OS level.
#     4. Set CPU governor to performance before starting:
#           echo performance > /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
#        Cinder OS does this automatically for the extreme preset via its
#        systemd service override.
#
# Design intent:
#   - Maximum heap within Pi 4 8GB constraints, accounting for OS overhead
#     (~500MB), Cinder Control (~256MB), and page cache.
#   - G1GC with the most aggressive concurrent marking settings safe on ARM64.
#     ZGC (available in Java 21) is annotated as an alternative for operators
#     running Java 21+; it reduces pause variance but increases CPU cost.
#   - All entity async workers enabled (3 on quad-core Pi 4).
#   - Maximum chunk cache size that fits within the heap budget.
#   - Simulation distance raised to 7 — the highest value that benchmarks
#     show is viable on Pi 4 at 20 TPS with < 300 entities loaded.
#   - Network connection ceiling raised to 50.
#   - Tick watchdog set to 75ms: tighter than event preset, still tolerant
#     of the larger GC pause budget that comes with a 3.5GB heap.
#
# =============================================================================

# ── Heap ──────────────────────────────────────────────────────────────────────
# 3.5GB: maximum practical heap on Pi 4 8GB with co-located services.
# If running as a dedicated compute node with no Cinder Control, can
# raise PRESET_HEAP_MAX to "4g" — monitor for OOM kills via dmesg.

PRESET_HEAP_MIN="2g"
PRESET_HEAP_MAX="3500m"

# ── GC flags ──────────────────────────────────────────────────────────────────
# Most aggressive G1GC settings viable on ARM64 / LPDDR4.
#
# ZGC alternative (Java 21+):
#   Replace this block with:
#     -XX:+UseZGC
#     -XX:ZCollectionInterval=5
#     -XX:ZFragmentationLimit=15
#     -XX:+ZGenerational          # Java 21 only
#   ZGC trades ~5-10% higher sustained CPU for near-zero pause variance.
#   Benchmark both before committing to ZGC in extreme mode.

PRESET_GC_FLAGS="
  -XX:+UseG1GC
  -XX:MaxGCPauseMillis=10
  -XX:G1HeapRegionSize=16m
  -XX:G1NewSizePercent=30
  -XX:G1MaxNewSizePercent=50
  -XX:G1MixedGCCountTarget=8
  -XX:G1RSetUpdatingPauseTimePercent=3
  -XX:InitiatingHeapOccupancyPercent=12
  -XX:SurvivorRatio=32
  -XX:MaxTenuringThreshold=1
  -XX:+ParallelRefProcEnabled
  -XX:ParallelGCThreads=2
  -XX:ConcGCThreads=2
  -XX:+PerfDisableSharedMem
  -XX:-OmitStackTraceInFastThrow
  -XX:+UseStringDeduplication
  -XX:StringDeduplicationAgeThreshold=1
  -XX:+EagerJVMCI
"

# ── Extra JVM flags ───────────────────────────────────────────────────────────
# JVMCI (Graal JIT) annotation: if running OpenJDK 21 with JVMCI support,
# enabling it can improve JIT quality on ARM64 for hot tick-loop code.
# Remove -XX:+EagerJVMCI from GC flags and test before enabling in production.

PRESET_EXTRA_FLAGS="
  -XX:+AlwaysPreTouch
  -XX:+DisableExplicitGC
  -Djava.awt.headless=true
  -Dfile.encoding=UTF-8
  -Djdk.nio.maxCachedBufferSize=524288
  -XX:+TieredCompilation
  -XX:ReservedCodeCacheSize=256m
  -XX:+UseCodeCacheFlushing
"

# ── Cinder Core engine settings ───────────────────────────────────────────────

CINDER_TPS=20

# Maximum async workers on quad-core Pi 4. Leaves 1 core for tick thread.
CINDER_ENTITY_ASYNC_WORKERS=3

# Large chunk cache: supports high player count and large simulation distance.
# 384 chunks ≈ 400MB NBT data — fits within the 3.5GB heap budget.
CINDER_CHUNK_CACHE_SIZE=384

# Raise IO threads to 2 only if running from USB3 NVMe/SSD.
# Keep at 1 for microSD.
CINDER_CHUNK_IO_THREADS=1

# Widest critical radius: maximises entity fidelity around all players.
# Raises MSPT entity cost; only viable if benchmark confirms headroom.
CINDER_ENTITY_CRITICAL_RADIUS=5

CINDER_ENTITY_DEFERRED_RADIUS=8

# Standard deferred interval: no change — aggressive deferral is a survival
# technique, not a high-performance one.
CINDER_ENTITY_DEFERRED_INTERVAL=4

# Maximum viable view distance on Pi 4 at 20 TPS.
# Confirmed through Cinder Bench stress tests with 300+ loaded entities.
# Do not raise above 10 without a full benchmark sweep first.
CINDER_VIEW_DISTANCE=10

# Simulation distance raised to 7. Monitor entity MSPT closely.
# If MSPT entity phase consistently exceeds 12ms, reduce to 6.
CINDER_SIMULATION_DISTANCE=7

CINDER_MAX_PLAYERS=50

CINDER_SCHEDULER_DRAIN_CAP=8192

# Tighter watchdog than event preset — large heap means GC pauses are
# longer, so 75ms gives room for a real GC event without false alarms.
CINDER_TICK_WATCHDOG_MS=75

# ── Logging ───────────────────────────────────────────────────────────────────

CINDER_PROFILER_RING_SIZE=1200
CINDER_LOG_LEVEL="INFO"

# Per-tick logging enabled: at extreme load, monitoring every tick is
# valuable for catching early degradation. Disable if log IO is contributing
# measurably to MSPT (check via Cinder Bench with/without this flag).
CINDER_LOG_TICK_LINES=true

# ── Backup / Save ─────────────────────────────────────────────────────────────

# Save every 7.5 minutes. More frequent than survival to reduce potential
# data loss exposure at higher player counts.
# 9000 ticks = 7.5 minutes at 20 TPS.
CINDER_SAVE_INTERVAL_TICKS=9000

CINDER_BACKUP_RETAIN=20

# ── Preset metadata ───────────────────────────────────────────────────────────

PRESET_NAME="extreme"
PRESET_DESCRIPTION="Maximum performance on actively cooled Pi 4 (8GB). 35-50 players. Requires thermal validation and benchmark sign-off."
PRESET_TARGET_HARDWARE="Raspberry Pi 4 8GB — active cooling required. ICE Tower or equivalent."
PRESET_AUTHOR="Cinder Project"
