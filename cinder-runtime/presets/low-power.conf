# Wrapper preset for runtime launch scripts.
# Loads the canonical preset definition from the repository root.

if [[ -f "${CINDER_BASE_DIR}/presets/low-power.conf" ]]; then
    # shellcheck source=/dev/null
    source "${CINDER_BASE_DIR}/presets/low-power.conf"
else
    # shellcheck source=/dev/null
    source "${CINDER_BASE_DIR}/low-power.conf"
fi
