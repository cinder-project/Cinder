# =============================================================================
# Cinder Runtime — Preset: survival
# =============================================================================
#
# Target profile:
#   Stable, long-running survival server on Raspberry Pi 4 (8GB).
#   Optimised for consistent TPS over raw throughput. Prioritises player
#   experience at 10–20 concurrent players. Suitable for 24/7 operation.
#
# Design intent:
#   - Heap kept below 2.5GB to leave 500MB+ headroom for OS, networking,
#     and Cinder Control on the same node. If Pi 4 is a dedicated compute
#     node (no control services co-located), PRESET_HEAP_MAX can be raised.
#   - G1GC with conservative pause targets. Pi 4's LPDDR4 has limited
#     memory bandwidth; large GC regions and aggressive young gen sizing
#     cause stalls. We keep region size small and pause target tight.
#   - No aggressive thread count: Pi 4 has 4 cores. Entity async workers
#     and the IO executor already consume 2. GC threads are bounded at 2
#     to avoid starving the tick thread.
#   - View distance and simulation distance are advisory defaults. The
#     server runtime reads these and applies them at startup. Operators
#     can override in server.properties.
#
# How presets work:
#   launch.sh sources this file. Variables prefixed PRESET_ are consumed
#   by launch.sh directly. Variables prefixed CINDER_ are consumed by
#   the Cinder Core runtime via system properties.
#
# =============================================================================

# ── Heap ──────────────────────────────────────────────────────────────────────

PRESET_HEAP_MIN="512m"
PRESET_HEAP_MAX="2048m"

# ── GC flags ──────────────────────────────────────────────────────────────────
# Full G1GC tuning for Pi 4 / ARM64 / LPDDR4.
# These override the launch.sh JVM_GC_FLAGS array when set.

PRESET_GC_FLAGS="
  -XX:+UseG1GC
  -XX:MaxGCPauseMillis=15
  -XX:G1HeapRegionSize=4m
  -XX:G1NewSizePercent=20
  -XX:G1MaxNewSizePercent=35
  -XX:G1MixedGCCountTarget=4
  -XX:G1RSetUpdatingPauseTimePercent=5
  -XX:InitiatingHeapOccupancyPercent=20
  -XX:SurvivorRatio=32
  -XX:MaxTenuringThreshold=1
  -XX:+ParallelRefProcEnabled
  -XX:ParallelGCThreads=2
  -XX:ConcGCThreads=1
  -XX:+PerfDisableSharedMem
  -XX:-OmitStackTraceInFastThrow
  -XX:+UseStringDeduplication
"

# ── Extra JVM flags ───────────────────────────────────────────────────────────
# Additional flags appended after GC flags.

PRESET_EXTRA_FLAGS="
  -XX:+AlwaysPreTouch
  -XX:+DisableExplicitGC
  -Djava.awt.headless=true
  -Dfile.encoding=UTF-8
  -Djdk.nio.maxCachedBufferSize=262144
"

# ── Cinder Core engine settings ───────────────────────────────────────────────
# These are passed to Cinder Core as system properties (-Dcinder.*).
# launch.sh appends -Dcinder.preset=survival automatically; individual
# settings here are applied by CinderServer at startup.

# Target TPS. 20 is the Minecraft standard. Reduce to 15 on severely
# constrained hardware (not recommended for gameplay).
CINDER_TPS=20

# Entity pipeline: async worker count. launch.sh defaults to nproc-1;
# override here if co-locating with other services.
CINDER_ENTITY_ASYNC_WORKERS=2

# Chunk cache: max loaded chunks in LRU cache.
# 192 chunks ≈ ~200MB depending on world density. Safe for 8GB Pi 4
# with 2GB heap. Raise to 256 if heap is raised.
CINDER_CHUNK_CACHE_SIZE=192

# Chunk IO threads. 1 for microSD; raise to 2 for USB3 SSD.
CINDER_CHUNK_IO_THREADS=1

# Entity tier thresholds (radius in chunks from nearest player).
# Entities within CRITICAL_RADIUS are upgraded to CRITICAL tier.
# Entities beyond DEFERRED_RADIUS are downgraded to DEFERRED tier.
CINDER_ENTITY_CRITICAL_RADIUS=3
CINDER_ENTITY_DEFERRED_RADIUS=6

# Deferred entity update interval (ticks). Must be >= 2.
CINDER_ENTITY_DEFERRED_INTERVAL=4

# View distance (chunks). Lower values reduce chunk load and entity count.
# 8 is a reasonable balance for Pi 4 at 20 concurrent players.
CINDER_VIEW_DISTANCE=8

# Simulation distance (chunks). Entities and blocks simulate within this radius.
# Keeping below view distance reduces CPU cost without affecting rendered terrain.
CINDER_SIMULATION_DISTANCE=6

# Network: max player connections. Pi 4 gigabit ethernet handles this comfortably.
# Set to 0 for unlimited (not recommended).
CINDER_MAX_PLAYERS=20

# Scheduler sync drain cap per tick.
CINDER_SCHEDULER_DRAIN_CAP=4096

# Watchdog: if the tick thread does not complete a tick within this many ms,
# Cinder logs a critical warning. Set to 0 to disable.
CINDER_TICK_WATCHDOG_MS=60

# ── Logging ───────────────────────────────────────────────────────────────────

# Tick profiler ring buffer size (ticks). 1200 = 60 seconds at 20 TPS.
CINDER_PROFILER_RING_SIZE=1200

# Log level for Cinder Core loggers. Options: FINE, INFO, WARNING, SEVERE.
CINDER_LOG_LEVEL="INFO"

# Emit per-tick log lines to the server log. Useful for post-mortem analysis.
# Set to false on resource-constrained nodes to reduce log volume.
CINDER_LOG_TICK_LINES=false

# ── Backup ────────────────────────────────────────────────────────────────────

# World save interval (ticks). 6000 = every 5 minutes at 20 TPS.
CINDER_SAVE_INTERVAL_TICKS=6000

# Number of rolling world backups to retain.
CINDER_BACKUP_RETAIN=10

# ── Preset metadata (informational) ──────────────────────────────────────────

PRESET_NAME="survival"
PRESET_DESCRIPTION="Stable 24/7 survival hosting on Pi 4 (8GB). 10-20 players. Consistent TPS priority."
PRESET_TARGET_HARDWARE="Raspberry Pi 4 8GB / Pi 400"
PRESET_AUTHOR="Cinder Project"
