# =============================================================================
# Cinder Runtime — Preset: low-power
# =============================================================================
#
# Target profile:
#   Thermally constrained, power-limited, or passively-cooled Raspberry Pi 4
#   operation. Designed for small private servers (2–8 players), always-on
#   AFK/farm worlds, or environments where the Pi 4 shares a power budget
#   with other devices (embedded enclosures, battery-backed setups).
#
# Design intent:
#   - Minimal heap: reduces memory pressure and GC frequency on a node
#     that may also be running other services (Cinder Control, monitoring,
#     USB import daemon). Target footprint < 1GB RSS.
#   - SerialGC instead of G1GC: on a lightly loaded server (< 8 players,
#     low entity count), SerialGC's single-threaded collection produces
#     lower total CPU consumption than G1's background threads. The trade-off
#     is longer individual GC pauses, which are acceptable when the server
#     is rarely near its MSPT budget.
#   - Reduced chunk cache: 96 chunks keeps the active world window tight
#     and reduces memory bandwidth pressure on LPDDR4.
#   - Wider deferred radius and longer deferred interval: most mobs on a
#     low-player server are distant or inactive. Deferring them aggressively
#     is correct behaviour, not a compromise.
#   - Tick watchdog raised: SerialGC pauses can transiently exceed 20ms on
#     a small heap under load. A 120ms watchdog prevents false-positive
#     alarms from occasional minor GC events.
#   - No AlwaysPreTouch: on a low-power node, we prefer fast startup over
#     pre-faulting heap pages, and the memory will warm up naturally.
#   - IO threads: 1. Always. microSD or not.
#
# Thermal notes:
#   Pi 4 under sustained server load without active cooling will throttle
#   at ~80°C. In this preset, CPU affinity is relaxed (all 4 cores permitted)
#   because the operating frequency is likely already reduced by the governor.
#   This avoids artificially restricting the Pi further.
#
#   Monitor temperature: watch -n 5 vcgencmd measure_temp
#   Set CPU governor:    echo powersave > /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
#
# =============================================================================

# ── Heap ──────────────────────────────────────────────────────────────────────

PRESET_HEAP_MIN="256m"
PRESET_HEAP_MAX="768m"

# ── GC flags ──────────────────────────────────────────────────────────────────
# SerialGC for minimal background CPU usage on lightly loaded servers.
# If player count regularly exceeds 10, switch to survival preset instead.

PRESET_GC_FLAGS="
  -XX:+UseSerialGC
  -XX:MaxHeapFreeRatio=40
  -XX:MinHeapFreeRatio=20
  -XX:-OmitStackTraceInFastThrow
  -XX:+PerfDisableSharedMem
  -XX:+UseStringDeduplication
"

# ── Extra JVM flags ───────────────────────────────────────────────────────────
# No AlwaysPreTouch — prefer fast startup on constrained hardware.
# Smaller NIO buffer cache to reduce off-heap memory use.

PRESET_EXTRA_FLAGS="
  -XX:+DisableExplicitGC
  -Djava.awt.headless=true
  -Dfile.encoding=UTF-8
  -Djdk.nio.maxCachedBufferSize=65536
"

# ── Cinder Core engine settings ───────────────────────────────────────────────

CINDER_TPS=20

# Single async worker for entity pre-computation.
# With < 8 players and a low entity count, parallelism offers little gain
# and background threads consume power unnecessarily.
CINDER_ENTITY_ASYNC_WORKERS=1

# Tight chunk cache: smaller loaded world window.
CINDER_CHUNK_CACHE_SIZE=96

CINDER_CHUNK_IO_THREADS=1

# Conservative entity tier radii: fewer entities in the critical tier
# means lower guaranteed MSPT. On a small server, this is almost always fine.
CINDER_ENTITY_CRITICAL_RADIUS=2
CINDER_ENTITY_DEFERRED_RADIUS=4

# Longer deferred interval: update distant entities every 6 ticks.
# At 20 TPS, deferred entities update ~3.3 times per second — still
# responsive enough for ambient mobs and passive farm entities.
CINDER_ENTITY_DEFERRED_INTERVAL=6

# Shorter view distance reduces chunk load and entity scan cost.
# 6 chunks is comfortable for small servers; players rarely notice
# the difference from 8 chunks in a private context.
CINDER_VIEW_DISTANCE=6

CINDER_SIMULATION_DISTANCE=5

CINDER_MAX_PLAYERS=8

CINDER_SCHEDULER_DRAIN_CAP=2048

# Raised watchdog threshold to accommodate SerialGC pause variability.
CINDER_TICK_WATCHDOG_MS=120

# ── Logging ───────────────────────────────────────────────────────────────────

# Smaller ring buffer to reduce heap use from profiler metadata.
CINDER_PROFILER_RING_SIZE=600

# WARNING level only: reduces log IO on the SD card.
CINDER_LOG_LEVEL="WARNING"

# No per-tick log lines: minimise SD card write amplification.
CINDER_LOG_TICK_LINES=false

# ── Backup ────────────────────────────────────────────────────────────────────

# Save every 15 minutes. Low player count means fewer dirty chunks
# per save sweep, so the IO cost is low. Frequent saves reduce potential
# data loss on a node that may lose power unexpectedly.
# 18000 ticks = 15 minutes at 20 TPS.
CINDER_SAVE_INTERVAL_TICKS=18000

CINDER_BACKUP_RETAIN=7

# ── Preset metadata ───────────────────────────────────────────────────────────

PRESET_NAME="low-power"
PRESET_DESCRIPTION="Thermally constrained / passively cooled Pi 4. 2-8 players. Minimal CPU and memory footprint."
PRESET_TARGET_HARDWARE="Raspberry Pi 4 (any RAM) — passively cooled or shared-power deployments"
PRESET_AUTHOR="Cinder Project"
