# =============================================================================
# Cinder Runtime — Preset: event
# =============================================================================
#
# Target profile:
#   Scheduled event hosting on Raspberry Pi 4 (8GB) — tournaments, build
#   competitions, community events. Designed for peak player counts (20–35),
#   elevated entity density, and short-duration high-intensity sessions
#   (1–6 hours) rather than indefinite 24/7 uptime.
#
# Design intent:
#   - Larger heap than survival: event sessions tolerate a longer startup
#     and pre-touch cost in exchange for fewer mid-session GC pauses.
#   - G1GC tuned more aggressively: initiating heap occupancy is dropped
#     to 15% so concurrent marking starts earlier, reducing the chance of
#     a full GC during a peak-player moment.
#   - Entity pipeline: critical radius is widened and deferred interval
#     shortened for tighter mob/entity responsiveness during PvP and
#     competitive play.
#   - Chunk cache raised to 256 to handle the larger pre-loaded arena
#     footprints typical of event worlds (pre-built maps, large arenas).
#   - Simulation distance kept at 6 (same as survival) — going higher
#     on Pi 4 in a high-entity scenario will degrade MSPT noticeably.
#   - Network connection ceiling raised to 35. Pi 4 gigabit ethernet is
#     not the bottleneck; packet processing CPU cost is.
#   - Save interval doubled (every 10 minutes) during events to reduce
#     IO-induced TPS dips during active play. Ensure a manual save is
#     triggered at session end via Cinder Control.
#
# Operator notes:
#   - Pre-load the event world before the session using:
#       cinder-control preload --world /path/to/event-world --radius 8
#   - Run a Cinder Bench sweep 30 minutes before the event to confirm TPS.
#   - After the event, switch back to survival preset and restart.
#
# =============================================================================

# ── Heap ──────────────────────────────────────────────────────────────────────

PRESET_HEAP_MIN="1g"
PRESET_HEAP_MAX="3g"

# ── GC flags ──────────────────────────────────────────────────────────────────
# More aggressive early marking and larger young gen vs. survival.
# GC thread count still bounded at 2 to leave cores for the tick thread
# and async workers.

PRESET_GC_FLAGS="
  -XX:+UseG1GC
  -XX:MaxGCPauseMillis=12
  -XX:G1HeapRegionSize=8m
  -XX:G1NewSizePercent=25
  -XX:G1MaxNewSizePercent=45
  -XX:G1MixedGCCountTarget=6
  -XX:G1RSetUpdatingPauseTimePercent=5
  -XX:InitiatingHeapOccupancyPercent=15
  -XX:SurvivorRatio=32
  -XX:MaxTenuringThreshold=1
  -XX:+ParallelRefProcEnabled
  -XX:ParallelGCThreads=2
  -XX:ConcGCThreads=2
  -XX:+PerfDisableSharedMem
  -XX:-OmitStackTraceInFastThrow
  -XX:+UseStringDeduplication
  -XX:StringDeduplicationAgeThreshold=1
"

# ── Extra JVM flags ───────────────────────────────────────────────────────────

PRESET_EXTRA_FLAGS="
  -XX:+AlwaysPreTouch
  -XX:+DisableExplicitGC
  -Djava.awt.headless=true
  -Dfile.encoding=UTF-8
  -Djdk.nio.maxCachedBufferSize=262144
"

# ── Cinder Core engine settings ───────────────────────────────────────────────

CINDER_TPS=20

# Raise async workers by 1 for event load. On Pi 4 this means 3 entity
# async workers, leaving 1 core for the tick thread. Monitor thermals.
CINDER_ENTITY_ASYNC_WORKERS=3

# Larger chunk cache for event maps with large pre-built areas.
CINDER_CHUNK_CACHE_SIZE=256

# IO threads: keep at 1 for microSD. Raise to 2 for USB3 SSD.
CINDER_CHUNK_IO_THREADS=1

# Tighter critical radius during competitive play (PvP, minigames).
# Entities within 4 chunks of a player are critical-tier.
CINDER_ENTITY_CRITICAL_RADIUS=4

# Deferred radius reduced: fewer distant entities are deprioritised.
# This raises MSPT slightly but improves consistency for ranged encounters.
CINDER_ENTITY_DEFERRED_RADIUS=7

# Shorter deferred interval: deferred entities update every 3 ticks
# instead of 4. Cost: ~8% more entity MSPT on a full deferred tier.
CINDER_ENTITY_DEFERRED_INTERVAL=3

# View distance: raised slightly for event maps with open terrain.
# Keep at 8 unless the event map is specifically built for longer sightlines
# and you have confirmed sub-30ms MSPT in benchmark mode first.
CINDER_VIEW_DISTANCE=8

CINDER_SIMULATION_DISTANCE=6

# Higher player cap for events.
CINDER_MAX_PLAYERS=35

CINDER_SCHEDULER_DRAIN_CAP=4096

# Longer watchdog threshold during events: complex event scripts may
# cause brief tick spikes that are not true hangs. Raise from 60 to 90 ms.
CINDER_TICK_WATCHDOG_MS=90

# ── Logging ───────────────────────────────────────────────────────────────────

CINDER_PROFILER_RING_SIZE=1200
CINDER_LOG_LEVEL="INFO"

# Enable per-tick log lines during events for post-mortem analysis.
# These help diagnose lag spikes caused by specific game events.
# Acceptable overhead: ~0.1ms/tick for log formatting on Pi 4.
CINDER_LOG_TICK_LINES=true

# ── Backup ────────────────────────────────────────────────────────────────────

# Less frequent auto-saves during events to reduce IO-induced TPS dips.
# Manual save should be triggered via Cinder Control at session end.
# 12000 ticks = every 10 minutes at 20 TPS.
CINDER_SAVE_INTERVAL_TICKS=12000

CINDER_BACKUP_RETAIN=15

# ── Preset metadata ───────────────────────────────────────────────────────────

PRESET_NAME="event"
PRESET_DESCRIPTION="High-capacity event hosting on Pi 4 (8GB). 20-35 players. Short-duration, peak-performance sessions."
PRESET_TARGET_HARDWARE="Raspberry Pi 4 8GB / Pi 400"
PRESET_AUTHOR="Cinder Project"
