# =============================================================================
# Cinder Runtime — Preset: benchmark
# =============================================================================
#
# Target profile:
#   Controlled, reproducible performance measurement on Raspberry Pi 4 (8GB).
#   Used by Cinder Bench to establish TPS/MSPT baselines, stress-test entity
#   and chunk pipelines, and measure the impact of code changes or config
#   tuning across runs.
#
# Design intent:
#   This preset is NOT optimised for player experience. It is optimised for
#   measurement stability and reproducibility. Every setting here exists to
#   reduce variance between runs so that comparisons are meaningful.
#
#   Key principles:
#
#   1. HEAP FIXED: Min == Max. Prevents JVM heap growth events from appearing
#      as MSPT spikes mid-benchmark. AlwaysPreTouch ensures heap pages are
#      faulted before the benchmark window opens.
#
#   2. GC DETERMINISTIC: G1GC with conservative tuning. We do NOT try to
#      minimise GC pauses here — we try to make them predictable. Aggressive
#      GC settings that work well in practice often introduce more variance
#      in short-run benchmarks.
#
#   3. JIT WARMUP: The benchmark runner (Cinder Bench) drives a warmup phase
#      before recording begins. These flags bias the JIT toward early
#      compilation to reduce warmup length and inter-run variance.
#
#   4. NO WATCHDOG: The tick watchdog is disabled during benchmarks. Stress
#      tests intentionally push MSPT above threshold; false watchdog alarms
#      would pollute the log.
#
#   5. ALL LOGGING ENABLED: Per-tick log lines are enabled. Cinder Bench
#      post-processes the log to extract MSPT histograms. The log overhead
#      is accounted for in the measurement (it is part of the real cost).
#
#   6. SAVE DISABLED: World auto-save is disabled during benchmark runs to
#      isolate compute cost from IO cost. Cinder Bench controls save timing
#      explicitly if IO benchmarking is required.
#
#   7. CPU AFFINITY STRICT: The JVM is pinned to cores 1-3 (same as production)
#      so benchmark results reflect production affinity behaviour.
#
# Reproducibility checklist (run before each benchmark session):
#   - Set CPU governor to performance:
#       echo performance > /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
#   - Confirm no thermal throttling:
#       vcgencmd measure_temp   # should be < 70°C
#   - Drop filesystem cache:
#       sync && echo 3 > /proc/sys/vm/drop_caches
#   - Kill non-essential services:
#       systemctl stop cinder-control  # re-enable after benchmarking
#   - Record Pi firmware and Java version in your benchmark notes.
#
# =============================================================================

# ── Heap ──────────────────────────────────────────────────────────────────────
# Fixed heap: Xms == Xmx. No heap growth events during the benchmark window.

PRESET_HEAP_MIN="2g"
PRESET_HEAP_MAX="2g"

# ── GC flags ──────────────────────────────────────────────────────────────────
# Conservative G1GC for measurement stability over pause minimisation.
# GC thread count matches production survival preset exactly.

PRESET_GC_FLAGS="
  -XX:+UseG1GC
  -XX:MaxGCPauseMillis=20
  -XX:G1HeapRegionSize=4m
  -XX:G1NewSizePercent=20
  -XX:G1MaxNewSizePercent=35
  -XX:G1MixedGCCountTarget=4
  -XX:G1RSetUpdatingPauseTimePercent=5
  -XX:InitiatingHeapOccupancyPercent=20
  -XX:SurvivorRatio=32
  -XX:MaxTenuringThreshold=1
  -XX:+ParallelRefProcEnabled
  -XX:ParallelGCThreads=2
  -XX:ConcGCThreads=1
  -XX:+PerfDisableSharedMem
  -XX:-OmitStackTraceInFastThrow
  -XX:+UseStringDeduplication
"

# ── Extra JVM flags ───────────────────────────────────────────────────────────
# JIT compilation bias toward early compilation to shorten warmup.
# CompileThreshold is reduced so hotspot methods are compiled faster.
# These are acceptable for benchmarking; they may hurt startup time in
# production presets and should not be copied there.

PRESET_EXTRA_FLAGS="
  -XX:+AlwaysPreTouch
  -XX:+DisableExplicitGC
  -Djava.awt.headless=true
  -Dfile.encoding=UTF-8
  -Djdk.nio.maxCachedBufferSize=262144
  -XX:CompileThreshold=100
  -XX:+TieredCompilation
  -XX:ReservedCodeCacheSize=128m
  -XX:+UseCodeCacheFlushing
  -Dcinder.bench.mode=true
"

# ── Cinder Core engine settings ───────────────────────────────────────────────

CINDER_TPS=20

# Match production entity worker count for representative benchmarks.
CINDER_ENTITY_ASYNC_WORKERS=2

# Larger chunk cache than survival: benchmark loads use pre-generated
# stress worlds that may span more chunks than a typical player session.
CINDER_CHUNK_CACHE_SIZE=512

CINDER_CHUNK_IO_THREADS=1

# Match production survival tier radii for representative entity benchmarks.
CINDER_ENTITY_CRITICAL_RADIUS=3
CINDER_ENTITY_DEFERRED_RADIUS=6
CINDER_ENTITY_DEFERRED_INTERVAL=4

# Match production view/simulation distances.
CINDER_VIEW_DISTANCE=8
CINDER_SIMULATION_DISTANCE=6

# No real players during benchmarks; synthetic load is injected by
# Cinder Bench's load simulation module.
CINDER_MAX_PLAYERS=0

CINDER_SCHEDULER_DRAIN_CAP=4096

# Watchdog disabled: stress phases intentionally exceed thresholds.
# A value of 0 disables the watchdog entirely.
CINDER_TICK_WATCHDOG_MS=0

# ── Logging ───────────────────────────────────────────────────────────────────

# Full ring buffer: Cinder Bench may run for several minutes.
# 6000 ticks = 5 minutes at 20 TPS.
CINDER_PROFILER_RING_SIZE=6000

# INFO level: include all informational events in the benchmark log.
CINDER_LOG_LEVEL="INFO"

# Per-tick log lines ENABLED: Cinder Bench parses these for MSPT histogram
# construction. The log write cost is intentionally included in measurements.
CINDER_LOG_TICK_LINES=true

# ── Backup / Save ─────────────────────────────────────────────────────────────

# Auto-save DISABLED during benchmarks (set to 0).
# Cinder Bench controls world save timing explicitly.
CINDER_SAVE_INTERVAL_TICKS=0

CINDER_BACKUP_RETAIN=3

# ── Preset metadata ───────────────────────────────────────────────────────────

PRESET_NAME="benchmark"
PRESET_DESCRIPTION="Controlled benchmarking preset. Fixed heap, JIT warmup bias, no auto-save. For use with Cinder Bench only."
PRESET_TARGET_HARDWARE="Raspberry Pi 4 8GB — performance CPU governor required"
PRESET_AUTHOR="Cinder Project"
