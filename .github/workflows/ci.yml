name: CI

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_VERSION: '8.11'

jobs:

  # ── Build & test ──────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Bootstrap Gradle wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="0.0.0-dev+${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "CINDER_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build
        run: gradle assemble --no-daemon

      - name: Test
        run: gradle test --no-daemon

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: cinder-jars-${{ steps.version.outputs.version }}
          path: |
            build/libs/cinder-*.jar
          retention-days: 30

  # ── ARM64 cross-compile verification ─────────────────────────────────────
  build-arm64:
    name: Cross-compile (ARM64)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Bootstrap Gradle wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Compile for ARM64 target
        run: |
          gradle compileJava \
            --no-daemon \
            -Porg.gradle.java.home="$JAVA_HOME"
        env:
          JAVA_TOOL_OPTIONS: "-XX:+UseSerialGC"

      - name: Verify class file targets
        run: |
          CLASS=$(find build/classes -name "CinderServer.class" | head -1)
          if [ -z "$CLASS" ]; then
            echo "CinderServer.class not found" && exit 1
          fi
          MAJOR=$(javap -verbose "$CLASS" | grep "major version" | awk '{print $NF}')
          echo "Class file major version: $MAJOR"
          [ "$MAJOR" = "65" ] && echo "Java 21 target confirmed." || (echo "Unexpected version $MAJOR" && exit 1)

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ build, build-arm64 ]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "CINDER_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Bootstrap Gradle wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Build release JARs
        run: gradle assemble --no-daemon

      - name: Generate checksums
        run: |
          cd build/libs
          sha256sum cinder-*.jar > SHA256SUMS
          cat SHA256SUMS

      - name: Extract release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES=$(awk "/^## ${TAG}/{flag=1; next} /^## v/{flag=0} flag" CHANGELOG.md 2>/dev/null || echo "Release ${TAG}")
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES"     >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cinder ${{ env.VERSION }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(env.VERSION, '-') }}
          files: |
            build/libs/cinder-${{ env.VERSION }}-all.jar
            build/libs/SHA256SUMS
