name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_VERSION: '8.11'

jobs:

  # ── Build & test ──────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Bootstrap Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Derive version
        id: version
        run: |
          git fetch --tags --quiet

          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)

          if [ -z "$LATEST" ]; then
            NEXT="0.1.0"
          else
            CURRENT="${LATEST#v}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "CINDER_VERSION=${NEXT}" >> "$GITHUB_ENV"
          echo "Derived version: ${NEXT} (from ${LATEST:-none}, sha=${SHORT_SHA})"

      - name: Build
        run: gradle assemble --no-daemon

      - name: Test
        run: gradle test --no-daemon

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: cinder-jars-${{ steps.version.outputs.version }}
          path: build/libs/cinder-*.jar
          retention-days: 30

  # ── ARM64 cross-compile verification ─────────────────────────────────────
  build-arm64:
    name: Cross-compile (ARM64)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Bootstrap Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Compile for ARM64 target
        run: gradle compileJava --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-XX:+UseSerialGC"
          CINDER_VERSION: ${{ needs.build.outputs.version }}

      - name: Verify class file target
        run: |
          CLASS=$(find build/classes -name "CinderServer.class" | head -1)
          [ -z "$CLASS" ] && echo "CinderServer.class not found" && exit 1
          MAJOR=$(javap -verbose "$CLASS" | grep "major version" | awk '{print $NF}')
          echo "Class file major version: $MAJOR"
          [ "$MAJOR" = "65" ] && echo "Java 21 confirmed." || (echo "Unexpected: $MAJOR" && exit 1)

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ build, build-arm64 ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Bootstrap Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Build release JARs
        run: gradle assemble --no-daemon
        env:
          CINDER_VERSION: ${{ needs.build.outputs.version }}

      - name: Generate checksums
        run: |
          cd build/libs
          sha256sum cinder-*.jar > SHA256SUMS
          cat SHA256SUMS

      - name: Tag and release
        env:
          VERSION: ${{ needs.build.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping release."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            build/libs/cinder-${VERSION}-all.jar \
            build/libs/SHA256SUMS \
            --title "Cinder ${VERSION}" \
            --notes "Build from commit \`$(git rev-parse --short HEAD)\` on \`main\`." \
            --latest
