name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_VERSION: '8.11'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Bootstrap Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Derive version
        id: version
        run: |
          git fetch --tags --quiet

          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)

          if [ -z "$LATEST" ]; then
            NEXT="0.1.0"
          else
            CURRENT="${LATEST#v}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "CINDER_VERSION=${NEXT}" >> "$GITHUB_ENV"
          echo "Derived version: ${NEXT} (from ${LATEST:-none}, sha=${SHORT_SHA})"

      - name: Build
        run: gradle assemble --no-daemon

      - name: Test
        run: gradle test --no-daemon

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: cinder-jars-${{ steps.version.outputs.version }}
          path: build/libs/cinder-*.jar
          retention-days: 30

  build-arm64:
    name: Cross-compile (ARM64)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Bootstrap Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Compile for ARM64 target
        run: gradle compileJava --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-XX:+UseSerialGC"
          CINDER_VERSION: ${{ needs.build.outputs.version }}

      - name: Verify class file target
        run: |
          CLASS=$(find build/classes -name "CinderServer.class" | head -1)
          [ -z "$CLASS" ] && echo "CinderServer.class not found" && exit 1
          MAJOR=$(javap -verbose "$CLASS" | grep "major version" | awk '{print $NF}')
          echo "Class file major version: $MAJOR"
          [ "$MAJOR" = "65" ] && echo "Java 21 confirmed." || (echo "Unexpected: $MAJOR" && exit 1)

  build-os-image:
    name: Build OS Image Bundle
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OS build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap qemu-user-static binfmt-support \
            parted kpartx dosfstools e2fsprogs \
            rsync xz-utils xorriso

      - name: Make build scripts executable
        run: |
          chmod +x os/build/build-image.sh
          chmod +x os/build/release-checksums.sh
          chmod +x os/build/create-release-iso.sh

      - name: Compute build date
        id: osdate
        run: echo "build_date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build ARM64 image
        run: |
          sudo ./os/build/build-image.sh \
            --version "${{ needs.build.outputs.version }}" \
            --output-dir "./os/build/output" \
            --image-size-gib 8

      - name: Normalize OS artifact ownership
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./os/build/output
          chmod -R u+rwX ./os/build/output

      - name: Build ISO bundle
        run: |
          ./os/build/create-release-iso.sh \
            --output-dir ./os/build/output \
            --version "${{ needs.build.outputs.version }}" \
            --build-date "${{ steps.osdate.outputs.build_date }}"

      - name: Remove raw image from artifact set
        run: rm -f ./os/build/output/cinder-os-${{ needs.build.outputs.version }}-arm64.img

      - name: Create release checksums
        run: ./os/build/release-checksums.sh ./os/build/output ./os/build/output/SHA256SUMS

      - name: Upload OS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cinder-os-images-${{ needs.build.outputs.version }}
          path: |
            os/build/output/*.img.zst
            os/build/output/*.img.xz
            os/build/output/*.iso
            os/build/output/*.sha256
            os/build/output/SHA256SUMS
            os/build/output/build-image-*.log
            os/build/output/build-*.log
          retention-days: 14

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ build, build-arm64, build-os-image ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Bootstrap Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Build release JARs
        run: gradle assemble --no-daemon
        env:
          CINDER_VERSION: ${{ needs.build.outputs.version }}

      - name: Generate checksums
        run: |
          cd build/libs
          sha256sum cinder-*.jar > JAR-SHA256SUMS
          cat JAR-SHA256SUMS

      - name: Download OS image artifacts
        uses: actions/download-artifact@v4
        with:
          name: cinder-os-images-${{ needs.build.outputs.version }}
          path: dist-os

      - name: Normalize release checksum filenames
        run: |
          cp dist-os/SHA256SUMS dist-os/OS-SHA256SUMS

      - name: Tag and release
        env:
          VERSION: ${{ needs.build.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="v${VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Remote tag $TAG already exists — continuing to release upload."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            RELEASE_CREATED=false
            for attempt in 1 2 3 4 5; do
              if gh release create "$TAG" \
                --title "Cinder ${VERSION}" \
                --notes "Build from commit \`$(git rev-parse --short HEAD)\` on \`main\`." \
                --latest; then
                RELEASE_CREATED=true
                break
              fi
              echo "Release create failed (attempt ${attempt}/5). Retrying..."
              sleep $((attempt * 3))
            done
            if [[ "${RELEASE_CREATED}" != "true" ]]; then
              echo "Release create failed after retries."
              exit 1
            fi
          fi

          ASSETS=(
            "build/libs/cinder-${VERSION}-all.jar"
            "build/libs/JAR-SHA256SUMS"
            "dist-os/OS-SHA256SUMS"
          )

          while IFS= read -r file; do
            ASSETS+=("$file")
          done < <(find dist-os -maxdepth 1 -type f ! -name 'SHA256SUMS' ! -name 'OS-SHA256SUMS' | sort)

          UPLOAD_OK=false
          for attempt in 1 2 3 4 5; do
            if gh release upload "$TAG" \
              "${ASSETS[@]}" \
              --clobber; then
              UPLOAD_OK=true
              break
            fi
            echo "Release asset upload failed (attempt ${attempt}/5). Retrying..."
            sleep $((attempt * 3))
          done

          if [[ "${UPLOAD_OK}" != "true" ]]; then
            echo "Release asset upload failed after retries."
            exit 1
          fi
