name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_VERSION: '8.11'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Bootstrap Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Derive version
        id: version
        run: |
          STABLE_VERSION="1.0.0"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${STABLE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "CINDER_VERSION=${STABLE_VERSION}" >> "$GITHUB_ENV"
          echo "Using stable version: ${STABLE_VERSION} (sha=${SHORT_SHA})"

      - name: Build
        run: gradle assemble --no-daemon

      - name: Test
        run: gradle test --no-daemon

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7

  build-os-image:
    name: Build OS Image Bundle
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OS build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap qemu-user-static binfmt-support \
            parted kpartx dosfstools e2fsprogs \
            rsync xz-utils xorriso

      - name: Make build scripts executable
        run: |
          chmod +x os/build/build-image.sh
          chmod +x os/build/release-checksums.sh
          chmod +x os/build/create-release-iso.sh

      - name: Compute build date
        id: osdate
        run: echo "build_date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build ARM64 image
        run: |
          sudo ./os/build/build-image.sh \
            --version "${{ needs.build.outputs.version }}" \
            --output-dir "./os/build/output" \
            --image-size-gib 8 \
            --paper-mc-version "1.20.1" \
            --paper-build latest

      - name: Normalize OS artifact ownership
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./os/build/output
          chmod -R u+rwX ./os/build/output

      - name: Build ISO bundle
        run: |
          ./os/build/create-release-iso.sh \
            --output-dir ./os/build/output \
            --version "${{ needs.build.outputs.version }}" \
            --build-date "${{ steps.osdate.outputs.build_date }}" \
            --min-size-gib 1

      - name: Remove raw image from artifact set
        run: rm -f ./os/build/output/cinder-os-${{ needs.build.outputs.version }}-arm64.img

      - name: Create release checksums
        run: ./os/build/release-checksums.sh ./os/build/output ./os/build/output/SHA256SUMS

      - name: Upload OS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cinder-os-images-${{ needs.build.outputs.version }}
          path: |
            os/build/output/*.img.zst
            os/build/output/*.img.xz
            os/build/output/*.iso
            os/build/output/*.sha256
            os/build/output/SHA256SUMS
            os/build/output/build-image-*.log
            os/build/output/build-*.log
          retention-days: 14

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ build, build-os-image ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download OS image artifacts
        uses: actions/download-artifact@v4
        with:
          name: cinder-os-images-${{ needs.build.outputs.version }}
          path: dist-os

      - name: Normalize release checksum filenames
        run: |
          cp dist-os/SHA256SUMS dist-os/OS-SHA256SUMS

      - name: Tag and release
        env:
          VERSION: ${{ needs.build.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="v${VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Remote tag $TAG already exists — continuing to release upload."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            RELEASE_CREATED=false
            for attempt in 1 2 3 4 5; do
              if gh release create "$TAG" \
                --title "Cinder OS ${VERSION} (PaperMC)" \
                --notes "Stable OS release with PaperMC runtime from commit \`$(git rev-parse --short HEAD)\` on \`main\`." \
                --latest; then
                RELEASE_CREATED=true
                break
              fi
              echo "Release create failed (attempt ${attempt}/5). Retrying..."
              sleep $((attempt * 3))
            done
            if [[ "${RELEASE_CREATED}" != "true" ]]; then
              echo "Release create failed after retries."
              exit 1
            fi
          fi

          ASSETS=(
            "dist-os/OS-SHA256SUMS"
          )

          while IFS= read -r file; do
            ASSETS+=("$file")
          done < <(find dist-os -maxdepth 1 -type f ! -name 'SHA256SUMS' ! -name 'OS-SHA256SUMS' | sort)

          UPLOAD_OK=false
          for attempt in 1 2 3 4 5; do
            if gh release upload "$TAG" \
              "${ASSETS[@]}" \
              --clobber; then
              UPLOAD_OK=true
              break
            fi
            echo "Release asset upload failed (attempt ${attempt}/5). Retrying..."
            sleep $((attempt * 3))
          done

          if [[ "${UPLOAD_OK}" != "true" ]]; then
            echo "Release asset upload failed after retries."
            exit 1
          fi
